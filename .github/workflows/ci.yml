name: CI

on:
  pull_request:
    branches: [dev]
  push:
    branches: [dev, main]

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      TLDEXTRACT_CACHE: /tmp/tldextract   # 리눅스 러너 캐시 경로 보정
      INTERNAL_API_KEY: test-ci-key       # 테스트용 더미값 — Settings 필수 필드라 없으면 import 단계에서 실패
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check app tests
      - name: Pytest
        run: pytest
